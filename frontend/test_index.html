<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电商商城 - 测试页面</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'PingFang SC', 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }
        
        .header {
            background: #409eff;
            color: white;
            padding: 24px 40px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 32px;
            margin-bottom: 8px;
        }
        
        .header p {
            opacity: 0.9;
        }
        
        .content {
            padding: 40px;
        }
        
        .status-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }
        
        .status-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 24px;
            text-align: center;
            transition: all 0.3s ease;
        }
        
        .status-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
        }
        
        .status-card h3 {
            font-size: 20px;
            margin-bottom: 16px;
            color: #333;
        }
        
        .status-indicator {
            font-size: 48px;
            margin-bottom: 16px;
        }
        
        .status-ok {
            color: #07c160;
        }
        
        .status-error {
            color: #ff6b6b;
        }
        
        .status-loading {
            color: #409eff;
        }
        
        .test-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 40px;
        }
        
        .test-button {
            padding: 16px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .test-button.primary {
            background: #409eff;
            color: white;
        }
        
        .test-button.primary:hover {
            background: #337ecc;
        }
        
        .test-button.success {
            background: #07c160;
            color: white;
        }
        
        .test-button.success:hover {
            background: #06ad56;
        }
        
        .test-button.warning {
            background: #ff6b6b;
            color: white;
        }
        
        .test-button.warning:hover {
            background: #ff5252;
        }
        
        .results {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 24px;
            margin-top: 40px;
        }
        
        .results h3 {
            margin-bottom: 16px;
            color: #333;
        }
        
        .result-content {
            background: white;
            border-radius: 8px;
            padding: 16px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            max-height: 300px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }
        
        .login-form {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
        }
        
        .form-group {
            margin-bottom: 16px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #409eff;
        }
        
        .footer {
            text-align: center;
            padding: 24px;
            color: #666;
            border-top: 1px solid #f0f0f0;
            margin-top: 40px;
        }
        
        @media (max-width: 768px) {
            .content {
                padding: 20px;
            }
            
            .status-section {
                grid-template-columns: 1fr;
            }
            
            .test-buttons {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>电商商城 - 测试页面</h1>
            <p>项目启动测试和功能验证</p>
        </div>
        
        <div class="content">
            <div class="status-section">
                <div class="status-card">
                    <div class="status-indicator" id="backend-status">⏳</div>
                    <h3>后端服务状态</h3>
                    <p id="backend-message">检查中...</p>
                </div>
                
                <div class="status-card">
                    <div class="status-indicator" id="frontend-status">✅</div>
                    <h3>前端服务状态</h3>
                    <p>测试页面已加载</p>
                </div>
                
                <div class="status-card">
                    <div class="status-indicator" id="database-status">⚠️</div>
                    <h3>数据库状态</h3>
                    <p>模拟数据模式</p>
                </div>
            </div>
            
            <div class="login-form">
                <h3>测试登录</h3>
                <div class="form-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" placeholder="输入 admin 或 user1" value="admin">
                </div>
                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" placeholder="输入 password123" value="password123">
                </div>
                <button class="test-button primary" onclick="testLogin()">测试登录</button>
            </div>
            
            <div class="test-buttons">
                <button class="test-button primary" onclick="testHealth()">检查后端健康状态</button>
                <button class="test-button success" onclick="testProducts()">获取商品列表</button>
                <button class="test-button warning" onclick="testUsers()">获取用户列表</button>
                <button class="test-button primary" onclick="clearResults()">清空结果</button>
            </div>
            
            <div class="results">
                <h3>测试结果</h3>
                <div class="result-content" id="result-output">
                    点击上方按钮开始测试...
                </div>
            </div>
        </div>
        
        <div class="footer">
            <p>电商商城项目测试页面 | 后端API: http://localhost:3000 | 前端: http://localhost:8080</p>
            <p>测试账号: admin / password123 | user1 / password123</p>
        </div>
    </div>

    <script>
        // 检查后端状态
        async function checkBackendStatus() {
            const statusEl = document.getElementById('backend-status');
            const messageEl = document.getElementById('backend-message');
            
            try {
                const response = await fetch('http://localhost:3000/health');
                if (response.ok) {
                    const data = await response.json();
                    statusEl.textContent = '✅';
                    statusEl.className = 'status-indicator status-ok';
                    messageEl.textContent = data.message || '后端服务运行正常';
                } else {
                    throw new Error('后端服务异常');
                }
            } catch (error) {
                statusEl.textContent = '❌';
                statusEl.className = 'status-indicator status-error';
                messageEl.textContent = '后端服务未启动或连接失败';
            }
        }
        
        // 测试健康检查
        async function testHealth() {
            showResult('正在检查后端健康状态...', 'info');
            
            try {
                const response = await fetch('http://localhost:3000/health');
                const data = await response.json();
                
                showResult(JSON.stringify(data, null, 2), 'success');
            } catch (error) {
                showResult(`健康检查失败: ${error.message}`, 'error');
            }
        }
        
        // 测试登录
        async function testLogin() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            showResult(`正在使用 ${username} 登录...`, 'info');
            
            try {
                const response = await fetch('http://localhost:3000/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showResult(`登录成功！\nToken: ${data.data.token}\n用户信息: ${JSON.stringify(data.data.user, null, 2)}`, 'success');
                } else {
                    showResult(`登录失败: ${data.message}`, 'error');
                }
            } catch (error) {
                showResult(`登录请求失败: ${error.message}`, 'error');
            }
        }
        
        // 测试商品列表
        async function testProducts() {
            showResult('正在获取商品列表...', 'info');
            
            try {
                const response = await fetch('http://localhost:3000/api/products');
                const data = await response.json();
                
                if (data.success) {
                    showResult(`商品列表获取成功！\n共 ${data.total} 个商品\n商品列表: ${JSON.stringify(data.data, null, 2)}`, 'success');
                } else {
                    showResult(`获取商品列表失败: ${data.message}`, 'error');
                }
            } catch (error) {
                showResult(`获取商品列表失败: ${error.message}`, 'error');
            }
        }
        
        // 测试用户列表
        async function testUsers() {
            showResult('正在获取用户列表...', 'info');
            
            try {
                const response = await fetch('http://localhost:3000/api/users');
                const data = await response.json();
                
                if (data.success) {
                    showResult(`用户列表获取成功！\n共 ${data.total} 个用户\n用户列表: ${JSON.stringify(data.data, null, 2)}`, 'success');
                } else {
                    showResult(`获取用户列表失败: ${data.message}`, 'error');
                }
            } catch (error) {
                showResult(`获取用户列表失败: ${error.message}`, 'error');
            }
        }
        
        // 显示结果
        function showResult(message, type = 'info') {
            const output = document.getElementById('result-output');
            const timestamp = new Date().toLocaleTimeString();
            
            let prefix = '';
            switch (type) {
                case 'success':
                    prefix = '✅ ';
                    break;
                case 'error':
                    prefix = '❌ ';
                    break;
                case 'info':
                    prefix = 'ℹ️ ';
                    break;
            }
            
            output.textContent = `[${timestamp}] ${prefix}${message}\n\n${output.textContent}`;
        }
        
        // 清空结果
        function clearResults() {
            document.getElementById('result-output').textContent = '结果已清空，点击上方按钮开始测试...';
        }
        
        // 页面加载时检查后端状态
        window.onload = function() {
            checkBackendStatus();
            // 每10秒检查一次后端状态
            setInterval(checkBackendStatus, 10000);
        };
    </script>
</body>
</html>
