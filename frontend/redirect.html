<!DOCTYPE html>
<html>
<head>
    <title>电商商城 - 重定向</title>
    <meta http-equiv="refresh" content="0; url=http://127.0.0.1:8080/index.html">
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .container {
            text-align: center;
            padding: 40px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            backdrop-filter: blur(10px);
        }
        
        h1 {
            margin-bottom: 20px;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin: 20px auto;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛒 电商商城</h1>
        <p>正在加载商城页面...</p>
        <div class="spinner"></div>
        <p>如果页面没有自动跳转，请 <a href="http://127.0.0.1:8080/index.html" style="color: #ffd700;">点击这里</a></p>
    </div>
</body>
</html>
